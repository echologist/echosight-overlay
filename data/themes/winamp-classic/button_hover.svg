<svg width="60" height="16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnHoverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#80ff80;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#40ff40;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#008000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Button background -->
  <rect width="60" height="16" fill="url(#btnHoverGrad)"/>
  
  <!-- Raised border effect -->
  <rect x="0" y="0" width="60" height="1" fill="#00ff00"/>
  <rect x="0" y="0" width="1" height="16" fill="#00ff00"/>
  <rect x="0" y="15" width="60" height="1" fill="#002000"/>
  <rect x="59" y="0" width="1" height="16" fill="#002000"/>
  
  <!-- Inner highlight -->
  <rect x="1" y="1" width="58" height="1" fill="#80ff80"/>
  <rect x="1" y="1" width="1" height="14" fill="#80ff80"/>
  
  <!-- Glow effect -->
  <rect x="2" y="2" width="56" height="12" fill="none" stroke="#00ff00" stroke-width="0.5" opacity="0.6"/>
</svg>
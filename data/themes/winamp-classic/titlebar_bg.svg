<svg width="300" height="20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#004000;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#008000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a000;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#008000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title bar background -->
  <rect width="300" height="20" fill="url(#titleGrad)"/>
  
  <!-- Top highlight -->
  <rect x="0" y="0" width="300" height="1" fill="#00ff00" opacity="0.7"/>
  
  <!-- Bottom shadow -->
  <rect x="0" y="19" width="300" height="1" fill="#002000"/>
  
  <!-- LED dots pattern -->
  <circle cx="10" cy="10" r="1" fill="#00ff00" opacity="0.8"/>
  <circle cx="20" cy="10" r="1" fill="#008000" opacity="0.6"/>
  <circle cx="30" cy="10" r="1" fill="#00ff00" opacity="0.8"/>
  <circle cx="280" cy="10" r="1" fill="#ff0000" opacity="0.8"/>
  <circle cx="290" cy="10" r="1" fill="#ff8000" opacity="0.8"/>
</svg>
<svg width="200" height="12" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="progBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#101010;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101010;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Progress bar background -->
  <rect width="200" height="12" fill="url(#progBgGrad)"/>
  
  <!-- Inset border -->
  <rect x="0" y="0" width="200" height="1" fill="#080808"/>
  <rect x="0" y="0" width="1" height="12" fill="#080808"/>
  <rect x="0" y="11" width="200" height="1" fill="#404040"/>
  <rect x="199" y="0" width="1" height="12" fill="#404040"/>
  
  <!-- Grid pattern -->
  <g stroke="#202020" stroke-width="0.5" opacity="0.3">
    <line x1="20" y1="0" x2="20" y2="12"/>
    <line x1="40" y1="0" x2="40" y2="12"/>
    <line x1="60" y1="0" x2="60" y2="12"/>
    <line x1="80" y1="0" x2="80" y2="12"/>
    <line x1="100" y1="0" x2="100" y2="12"/>
    <line x1="120" y1="0" x2="120" y2="12"/>
    <line x1="140" y1="0" x2="140" y2="12"/>
    <line x1="160" y1="0" x2="160" y2="12"/>
    <line x1="180" y1="0" x2="180" y2="12"/>
  </g>
</svg>
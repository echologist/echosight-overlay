<svg width="200" height="10" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="progFillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#008000;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#80ff80;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#00ff00;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Progress fill background -->
  <rect x="1" y="1" width="198" height="8" fill="url(#progFillGrad)"/>
  
  <!-- Highlight on top -->
  <rect x="1" y="1" width="198" height="2" fill="url(#glowGrad)"/>
  

# .github/workflows/build.yml
name: Build Cross-Platform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Granting workflow permissions to create releases
permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails :)
      matrix:
        include:
          - os: macos-latest
            build_script: "build-mac"
            artifacts: "dist/*.dmg"
          - os: windows-latest  
            build_script: "build-win"
            artifacts: "dist/*.exe"
          - os: ubuntu-latest
            build_script: "build-linux" 
            artifacts: "dist/*.AppImage dist/*.deb"
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create missing icon files (if needed)
      shell: bash
      run: |
        # Create assets directory if it doesn't exist
        mkdir -p assets
        
        # Create a simple PNG icon if missing (for testing)
        if [ ! -f "assets/icon.png" ]; then
          echo "Creating placeholder icon.png"
          # This creates a simple 256x256 colored square as PNG
          # You should replace this with your actual icon later
          if command -v convert >/dev/null 2>&1; then
            convert -size 256x256 xc:blue assets/icon.png
          else
            # Download a simple placeholder if ImageMagick not available
            curl -L "https://via.placeholder.com/256x256/0066cc/ffffff?text=POE" -o assets/icon.png || echo "Could not create icon"
          fi
        fi
        
        # Create ICN file for Mac (convert from PNG)
        if [ ! -f "assets/icon.icns" ] && [ -f "assets/icon.png" ]; then
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # On Mac, create proper ICNS file
            mkdir -p icon.iconset
            sips -z 16 16     assets/icon.png --out icon.iconset/icon_16x16.png
            sips -z 32 32     assets/icon.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32     assets/icon.png --out icon.iconset/icon_32x32.png
            sips -z 64 64     assets/icon.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128   assets/icon.png --out icon.iconset/icon_128x128.png
            sips -z 256 256   assets/icon.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256   assets/icon.png --out icon.iconset/icon_256x256.png
            sips -z 512 512   assets/icon.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512   assets/icon.png --out icon.iconset/icon_512x512.png
            sips -z 1024 1024 assets/icon.png --out icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o assets/icon.icns
            rm -rf icon.iconset
          else
            # On other systems, just copy the PNG as ICNS (not ideal but works)
            cp assets/icon.png assets/icon.icns
          fi
        fi
        
    - name: Build application
      run: npm run ${{ matrix.build_script }}
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: ${{ matrix.artifacts }}
        if-no-files-found: warn
        retention-days: 7  # Increased retention for release process

  # New release job - only runs on main branch pushes (not PRs)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version from package.json
      id: package_version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        
    - name: Display downloaded artifacts
      run: ls -la ./artifacts/
      
    - name: Prepare release assets
      run: |
        mkdir -p ./release-assets
        
        # Debug: Show the actual artifact structure
        echo "Artifact directory structure:"
        find ./artifacts -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" | head -20
        
        # Copy files using the correct artifact structure
        # The artifacts are downloaded to subdirectories named after the artifact names
        find ./artifacts -name "*.exe" -exec cp {} ./release-assets/ \;
        find ./artifacts -name "*.dmg" -exec cp {} ./release-assets/ \;
        find ./artifacts -name "*.AppImage" -exec cp {} ./release-assets/ \;
        find ./artifacts -name "*.deb" -exec cp {} ./release-assets/ \;
        
        # List what we're about to release
        echo "Release assets:"
        ls -la ./release-assets/
        
        # Check if we have any files to release
        if [ ! "$(ls -A ./release-assets/)" ]; then
          echo "WARNING: No release assets found!"
          echo "Artifact structure:"
          find ./artifacts -type f | head -10
          exit 1
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.package_version.outputs.version }}
        name: "Echosight v${{ steps.package_version.outputs.version }}"
        body: |
          ## Echosight PoE2 Task Overlay v${{ steps.package_version.outputs.version }}
          
          **Download for your platform:**
          - **Windows**: `.exe` file
          - **macOS**: `.dmg` file  
          - **Linux**: `.AppImage` or `.deb` file
          
          ### Changes in this release
          - Auto-generated release from commit: ${{ github.sha }}
          - Built from branch: ${{ github.ref_name }}
          
          ### Installation
          - **Windows**: Download the `.exe` file and run it directly (portable)
          - **macOS**: Download and mount the `.dmg` file, then drag to Applications
          - **Linux**: Download `.AppImage` (make executable and run) or install `.deb` package
          
          ---
          *This is an automated release created by GitHub Actions*
        files: ./release-assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}